<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StockGlass - Admin Login</title>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-tint": "#a43e00",
                        "tertiary": "#006591",
                        "surface-container": "#ffe9e2",
                        "tertiary-container": "#00a4e9",
                        "on-primary-container": "#5b1f00",
                        "secondary-container": "#e2dfde",
                        "primary": "#a43e00",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-surface": "#3c2d27",
                        "inverse-on-surface": "#ffede7",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#360f00",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#7d2d00",
                        "surface-variant": "#f7ddd3",
                        "primary-container": "#ff6d1f",
                        "primary-fixed-dim": "#ffb596",
                        "background": "#fff8f6",
                        "surface": "#fff8f6",
                        "outline": "#8d7165",
                        "tertiary-fixed-dim": "#89ceff",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1b1c1c",
                        "primary-fixed": "#ffdbcd",
                        "on-tertiary-fixed": "#001e2f",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#f7ddd3",
                        "secondary": "#5f5e5e",
                        "surface-dim": "#eed5cb",
                        "on-surface-variant": "#594137",
                        "surface-container-high": "#fde3d9",
                        "surface-container-low": "#fff1ec",
                        "on-background": "#261813",
                        "on-secondary-fixed-variant": "#474746",
                        "outline-variant": "#e1bfb2",
                        "on-surface": "#261813",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#636262",
                        "on-tertiary-container": "#003650",
                        "surface-bright": "#fff8f6",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffb596",
                        "secondary-fixed-dim": "#c8c6c5",
                        "tertiary-fixed": "#c9e6ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "gutter": "24px",
                        "glass-padding": "20px",
                        "container-padding-desktop": "32px",
                        "container-padding-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Hanken Grotesk"],
                        "headline-lg": ["Manrope"],
                        "body-md": ["Hanken Grotesk"],
                        "display-lg": ["Manrope"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "headline-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(255, 248, 246, 0.4); /* surface color with opacity */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(38, 24, 19, 0.1);
        }
        
        .dark .glass-panel {
            background-color: rgba(60, 45, 39, 0.4); /* inverse-surface with opacity */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .input-glass {
            background-color: rgba(255, 255, 255, 0.5);
            border: none;
            border-bottom: 2px solid rgba(141, 113, 101, 0.3); /* outline color with opacity */
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            outline: none;
            border-bottom-color: #ff6d1f; /* primary-container */
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 12px rgba(255, 109, 31, 0.1);
        }

        .dark .input-glass {
            background-color: rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #ffede7;
        }

        .dark .input-glass:focus {
            border-bottom-color: #ff6d1f;
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* Ambient Background Effect */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(135deg, #fff8f6 0%, #fde3d9 50%, #ffe9e2 100%);
            overflow: hidden;
        }

        .dark .ambient-bg {
            background: linear-gradient(135deg, #261813 0%, #3c2d27 50%, #1b1c1c 100%);
        }

        .ambient-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            border-radius: 50%;
            animation: float 20s infinite ease-in-out alternate;
        }

        .dark .ambient-blob {
            opacity: 0.3;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: rgba(255, 109, 31, 0.2); /* primary-container */
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: rgba(164, 62, 0, 0.15); /* primary */
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-padding-mobile md:p-container-padding-desktop transition-colors duration-300">
<!-- Dynamic Background -->
<div class="ambient-bg">
<div class="ambient-blob blob-1"></div>
<div class="ambient-blob blob-2"></div>
</div>
<!-- Theme Toggle -->
<button aria-label="Toggle Theme" class="fixed top-gutter right-gutter p-unit rounded-full glass-panel flex items-center justify-center hover:scale-105 transition-transform z-50 text-on-surface" id="theme-toggle">
<span class="material-symbols-outlined" id="theme-icon" style="font-variation-settings: 'FILL' 0;">light_mode</span>
</button>
<!-- Login Container -->
<main class="w-full max-w-md">
<!-- Brand Header (Outside Card) -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
                StockGlass
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-2">Admin Console</p>
</div>
<!-- Glass Login Card -->
<div class="glass-panel rounded-xl p-8 md:p-10 relative overflow-hidden">
<!-- Subtle shine effect -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/20 to-transparent pointer-events-none"></div>
<h2 class="font-headline-md text-headline-md mb-6 text-on-surface">Sign In</h2>
<form action="#" class="space-y-6 relative z-10" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
<input class="input-glass w-full py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50" id="email" name="email" placeholder="admin@stockglass.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-surface-tint transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50">lock</span>
<input class="input-glass w-full py-3 pl-10 pr-10 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-4">
<button class="w-full bg-primary-container hover:bg-surface-tint text-white font-label-md text-label-md py-4 rounded-lg shadow-lg hover:shadow-xl transition-all duration-300 flex justify-center items-center gap-2 transform hover:-translate-y-0.5" type="submit">
                        Sign In
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<div class="mt-6 text-center">
<p class="font-body-md text-body-md text-on-surface-variant text-sm">
                        Secure access for authorized personnel only.
                    </p>
</div>
</form>
</div>
</main>
<script>
        // Simple Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('light')) {
                htmlElement.classList.remove('light');
                htmlElement.classList.add('dark');
                themeIcon.textContent = 'dark_mode';
            } else {
                htmlElement.classList.remove('dark');
                htmlElement.classList.add('light');
                themeIcon.textContent = 'light_mode';
            }
        });
    </script>
</body></html>
